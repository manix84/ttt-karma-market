name: Build and Deploy to Steam Workshop

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: steam-workshop-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Lua 5.1
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.1

      - name: Run checks
        run: bash scripts/check_all.sh

      - name: Upload to Steam Workshop
        uses: gmod-workshop/workshop-upload@v1
        with:
          username: ${{ secrets.STEAM_USERNAME }}
          vdf: ${{ secrets.STEAM_VDF }}
          id: ${{ secrets.STEAM_WORKSHOP_ID }}
          changelog: ${{ github.event.head_commit.message || 'Manual Steam Workshop deploy' }}
          icon: workshop/icon.jpg
          dir: ./
